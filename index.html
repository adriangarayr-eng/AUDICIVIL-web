<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDICIVIL - Gestión de Auditorio</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        /* Estilo Cineplanet (Azul, Amarillo, Oscuro) */
        :root {
            --fondo: #000814;
            --azul-primario: #001d3d;
            --azul-acento: #003566;
            --dorado: #ffc300;
            --texto: #e0e1dd;
        }

        body { 
            font-family: 'Arial', sans-serif; 
            background-color: var(--fondo); 
            color: white; margin: 0; 
        }

        header { 
            background: var(--azul-primario); 
            padding: 30px; 
            text-align: center; 
            border-bottom: 5px solid var(--dorado); 
        }

        header h1 { color: var(--dorado); margin: 0; font-size: 2.5em; letter-spacing: 2px; }

        nav { display: flex; justify-content: center; background: #00152b; padding: 10px; gap: 20px; }
        nav button { 
            background: transparent; border: none; color: white; cursor: pointer; 
            font-weight: bold; padding: 10px 20px; text-transform: uppercase;
        }
        nav button.active { border-bottom: 3px solid var(--dorado); color: var(--dorado); }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }

        /* Cartelera */
        .cartelera-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .movie-card { 
            background: var(--azul-primario); border-radius: 10px; overflow: hidden; 
            transition: 0.3s; border: 1px solid #003566;
        }
        .movie-card:hover { transform: translateY(-10px); box-shadow: 0 0 20px rgba(255,195,0,0.2); }
        .movie-card img { width: 100%; height: 450px; object-fit: cover; }
        .card-content { padding: 15px; }
        .card-content h3 { margin: 0 0 10px; color: var(--dorado); text-transform: uppercase; }
        .info-row { font-size: 0.9em; margin-bottom: 5px; color: #a2d2ff; }

        /* Formulario */
        .form-box { 
            background: var(--azul-primario); padding: 30px; border-radius: 10px; 
            max-width: 500px; margin: auto; display: none; 
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--dorado); }
        input, textarea { 
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--azul-acento); 
            color: white; border-radius: 5px; box-sizing: border-box;
        }
        .btn-send { 
            background: var(--dorado); color: black; border: none; width: 100%; 
            padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        #loading { text-align: center; display: none; color: var(--dorado); }
    </style>
</head>
<body>

<header>
    <h1>AUDICIVIL</h1>
    <p>Auditorio Ricardo Ramiro Santos Rodríguez - EPIC UNMSM</p>
</header>

<nav>
    <button id="btn-view" class="active" onclick="showTab('view')">Cartelera</button>
    <button id="btn-add" onclick="showTab('add')">Agregar Evento</button>
</nav>

<div class="container">
    <div id="loading">Subiendo evento... espera un toque, neto...</div>

    <div id="tab-view">
        <h2 style="text-align: center; margin-bottom: 30px;">PRÓXIMOS ESTRENOS EN LA FACU</h2>
        <div class="cartelera-grid" id="lista-eventos">
            </div>
    </div>

    <div id="tab-add" class="form-box">
        <h2 style="text-align: center; color: var(--dorado);">REGISTRAR EVENTO</h2>
        <form id="event-form">
            <div class="form-group">
                <label>Título del Evento</label>
                <input type="text" id="title" required placeholder="Ej: Seminario de Hidráulica">
            </div>
            <div class="form-group">
                <label>Imagen de Referencia (Archivo)</label>
                <input type="file" id="image-file" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Horario</label>
                <input type="time" id="time" required>
            </div>
            <div class="form-group">
                <label>Información Extra</label>
                <textarea id="extra" rows="3" placeholder="Ponentes, salón, etc."></textarea>
            </div>
            <button type="submit" class="btn-send">PUBLICAR EVENTO</button>
        </form>
    </div>
</div>

<script>
    // Configuración de Firebase (Neto, aquí pegas TUS llaves de Firebase)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO_ID",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Cambiar de pestaña
    function showTab(tab) {
        document.getElementById('tab-view').style.display = tab === 'view' ? 'block' : 'none';
        document.getElementById('tab-add').style.display = tab === 'add' ? 'block' : 'none';
        document.getElementById('btn-view').className = tab === 'view' ? 'active' : '';
        document.getElementById('btn-add').className = tab === 'add' ? 'active' : '';
        if(tab === 'view') loadEvents();
    }

    // Subir imagen y guardar datos
    document.getElementById('event-form').onsubmit = async (e) => {
        e.preventDefault();
        const loader = document.getElementById('loading');
        loader.style.display = 'block';

        const file = document.getElementById('image-file').files[0];
        const title = document.getElementById('title').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const extra = document.getElementById('extra').value;

        try {
            // 1. Subir imagen al Storage de Firebase
            const storageRef = storage.ref(`eventos/${Date.now()}_${file.name}`);
            await storageRef.put(file);
            const imageUrl = await storageRef.getDownloadURL();

            // 2. Guardar info en Firestore (Base de datos)
            await db.collection("eventos").add({
                title, date, time, extra, imageUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("¡Ya está en la cartelera, neto!");
            document.getElementById('event-form').reset();
            showTab('view');
        } catch (error) {
            console.error(error);
            alert("Algo falló, revisa la consola.");
        }
        loader.style.display = 'none';
    };

    // Cargar eventos en tiempo real
    function loadEvents() {
        db.collection("eventos").orderBy("date", "asc").onSnapshot((snapshot) => {
            const container = document.getElementById('lista-eventos');
            container.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const ev = doc.data();
                container.innerHTML += `
                    <div class="movie-card">
                        <img src="${ev.imageUrl}" alt="Evento">
                        <div class="card-content">
                            <h3>${ev.title}</h3>
                            <div class="info-row"><b>FECHA:</b> ${ev.date}</div>
                            <div class="info-row"><b>HORA:</b> ${ev.time}</div>
                            <div class="info-row" style="color:white; margin-top:10px;">${ev.extra}</div>
                        </div>
                    </div>
                `;
            });
        });
    }

    // Carga inicial
    loadEvents();
</script>
</body>

</html>
